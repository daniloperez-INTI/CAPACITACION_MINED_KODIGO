    <h2>Introducción a Git</h2>
    <h3>¿Qué es Git?</h3>
    <p>Git es un sistema de control de versiones distribuido que permite a los desarrolladores rastrear los cambios en su código fuente a lo largo del tiempo. Fue creado por Linus Torvalds en 2005 para ayudar en el desarrollo del kernel de Linux.</p>
